<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="container">

    <h2>Decrypt Your File</h2>

    <form method="POST" action="/decrypt" enctype="multipart/form-data">

        <!-- File Upload -->
        <label>Select Encrypted File:</label><br>
        <input type="file" name="file" required>

        <br><br>

        <!-- Encryption Method (RADIO BUTTONS) -->
        <label>Select Encryption Method:</label>

        <div class="option-group">

            <label class="option">
                <input type="radio" name="method" value="Lightweight Encryption" required>
                <span>Lightweight Encryption (XOR)</span>
            </label>

            <label class="option">
                <input type="radio" name="method" value="Standard AES Encryption">
                <span>Standard AES Encryption</span>
            </label>

            <label class="option">
                <input type="radio" name="method" value="High-Security AES Encryption">
                <span>High-Security AES Encryption</span>
            </label>

            <label class="option">
                <input type="radio" name="method" value="Hybrid Encryption (AES + RSA)">
                <span>Hybrid Encryption (AES + RSA)</span>
            </label>

        </div>

        <br>

        <!-- Key Input -->
        <label>Enter Decryption Key:</label><br>
        <input type="text" name="key" required>

        <br><br>

        <!-- Submit -->
        <button type="submit" class="btn">Decrypt File</button>

    </form>

    <br>

    <!-- Navigation -->
    <a href="/" class="btn">Back to Home</a>

</div>

</body>
</html>
