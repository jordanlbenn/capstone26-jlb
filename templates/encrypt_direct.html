<!DOCTYPE html>
<html lang="en">
    
<head>
    <title>Encryption Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>
<div class="container">
    <!-- Navigation -->
    <div class="button-group">
        <a href="{{ url_for('home') }}" class="btn">Go Home</a>
    </div>

</div>

<div class="container">
    <h3>Apply Encryption</h3>

    <form action="{{ url_for('process_file') }}" method="POST" enctype="multipart/form-data">
        
            <label>Your Name:</label>
            <input type="text" name="username" placeholder="Enter your name" required>
        
    <!-- File Upload -->
        <label>Select File:</label><br>
        <input type="file" name="file" required>
        <br><br>

        <!-- Encryption Options -->
        <label>Choose Encryption Method:</label>
        <div class="option-group">

            <label class="option">
                <input type="radio" name="method" value="Lightweight Encryption" checked>
                <span>Lightweight Encryption</span>
            </label>

            <label class="option">
                <input type="radio" name="method" value="Standard AES Encryption">
                <span>Standard AES</span>
            </label>

            <label class="option">
                <input type="radio" name="method" value="Hybrid Encryption (AES + RSA)">
                <span>Hybrid Encryption (AES + RSA)</span>
            </label>
        </div>

        <br>

        <!-- Key Input -->
        <label>Enter Encryption Key</label>
        <input type="text" name="key" placeholder="Enter secure key..." required>
        <br><br>

        <!-- Submit Button -->
        <div class="button-group">
            <button type="submit" class="btn">Encrypt File</button>
            <a href="{{ url_for('decrypt_file_page') }}" class="btn">Decrypt File</a>
        </div>
        
    </form>
</div>

</body>
</html>
